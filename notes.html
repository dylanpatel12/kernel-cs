<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kernel — notes</title>
<link rel="stylesheet" href="style.css">
<style>
  .note-section{margin-bottom:26px;}
  .note-heading{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin-bottom:10px;color:var(--copper);}
  .note-points{list-style:none;}
  .note-points li{
    font-size:14.5px;line-height:1.7;color:var(--text);padding-left:18px;position:relative;margin-bottom:8px;
  }
  .note-points li::before{
    content:"";position:absolute;left:0;top:9px;width:6px;height:1.5px;background:var(--copper-dim);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-mark">K</div>
      <div><div class="brand-name">Kernel</div><div class="brand-tag">Exam practice</div></div>
    </div>
    <div class="spec-tag">OCR H446</div>
  </header>

  <a class="back-link" id="back-link" href="home.html">&larr; back to module</a>
  <div class="eyebrow" id="section-label"></div>
  <h1 class="hero" id="topic-title"></h1>
  <p class="hero-sub">A quick summary — not a substitute for the full specification, but enough to refresh before testing yourself.</p>

  <div id="notes-body"></div>

  <footer>Kernel — original questions, written to the OCR H446 specification.<br>Not affiliated with or endorsed by OCR.</footer>
</div>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const topic = code ? window.KERNEL_DATA[code] : null;

  if(!topic){
    window.location.href = 'coming-soon.html' + (code ? ('?topic=' + encodeURIComponent(code)) : '');
  } else {
    document.getElementById('back-link').href = 'topic.html?code=' + code;
    document.getElementById('section-label').textContent = code + ' · ' + topic.section;
    document.getElementById('topic-title').textContent = topic.title;
    document.title = 'Kernel — ' + topic.title + ' notes';

    const body = document.getElementById('notes-body');
    topic.notes.forEach(section=>{
      const div = document.createElement('div');
      div.className = 'note-section';
      const points = section.points.map(p => `<li>${p}</li>`).join('');
      div.innerHTML = `<div class="note-heading">${section.heading}</div><ul class="note-points">${points}</ul>`;
      body.appendChild(div);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kernel — coming soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');
  :root{
    --bg:#0B1210; --panel:#101A16; --grid:#1B2A24; --trace:#2A3F37;
    --copper:#E8A33D; --copper-dim:#7A5A26;
    --text:#E9E7DD; --text-dim:#8FA69B; --text-faint:#5B6E66;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/40px 40px,
      var(--bg);
    color:var(--text); font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:32px 16px;
  }
  .card{
    max-width:420px; text-align:center; background:var(--panel);
    border:1px solid var(--trace); border-radius:8px; padding:44px 32px;
  }
  .mark{
    width:44px;height:44px;border:1.5px solid var(--copper-dim);border-radius:6px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
    font-family:'IBM Plex Mono';font-size:15px;color:var(--copper-dim);
  }
  h1{font-family:'Space Grotesk';font-weight:600;font-size:19px;margin-bottom:8px;}
  p{font-size:13.5px;color:var(--text-dim);line-height:1.6;margin-bottom:22px;}
  .code{
    font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);
    border:1px solid var(--trace);border-radius:4px;padding:5px 9px;display:inline-block;margin-bottom:22px;
  }
  a.back{
    font-family:'IBM Plex Mono';font-size:12px;color:var(--copper);text-decoration:none;
    border:1px solid var(--copper-dim);border-radius:6px;padding:10px 18px;display:inline-block;
  }
  a.back:hover{background:var(--copper);color:var(--bg);}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">K</div>
    <div class="code" id="topic-code">module not yet wired</div>
    <h1>This module isn't built yet</h1>
    <p>Questions for this spec point haven't been written. Everything else on Kernel works the same way once it's live — instant marking, full explanations, no login required.</p>
    <a class="back" href="index.html">&larr; back to the module map</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('topic');
    if(code) document.getElementById('topic-code').textContent = code;
  </script>
</body>
</html>

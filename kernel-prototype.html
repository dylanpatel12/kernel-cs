<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kernel — OCR A-Level Computer Science</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

  :root{
    --bg:#0B1210;
    --panel:#101A16;
    --panel-raised:#132019;
    --grid:#1B2A24;
    --trace:#2A3F37;
    --copper:#E8A33D;
    --copper-dim:#7A5A26;
    --phosphor:#4FD8A0;
    --phosphor-dim:#1F4A38;
    --fault:#E8574A;
    --fault-dim:#4A2420;
    --text:#E9E7DD;
    --text-dim:#8FA69B;
    --text-faint:#5B6E66;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/40px 40px,
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:32px 16px 64px;
  }
  .wrap{max-width:720px;margin:0 auto;}

  /* ---- header ---- */
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border:1.5px solid var(--copper);border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono';font-size:12px;color:var(--copper);position:relative;
  }
  .brand-mark::before,.brand-mark::after{
    content:"";position:absolute;width:6px;height:1.5px;background:var(--copper);
  }
  .brand-mark::before{left:-6px;top:50%;}
  .brand-mark::after{right:-6px;top:50%;}
  .brand-name{font-family:'Space Grotesk';font-size:20px;font-weight:600;letter-spacing:0.3px;}
  .brand-tag{font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;}
  .spec-tag{font-family:'IBM Plex Mono';font-size:11px;color:var(--text-dim);border:1px solid var(--trace);padding:4px 8px;border-radius:4px;}

  h1.hero{
    font-family:'Space Grotesk';font-weight:600;font-size:28px;line-height:1.25;
    margin:28px 0 6px;max-width:520px;
  }
  .hero-sub{font-size:14px;color:var(--text-dim);max-width:480px;margin-bottom:36px;}

  /* ---- board (landing) ---- */
  .board{position:relative;margin-bottom:8px;}
  .board svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .modules{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}

  .module{
    background:var(--panel);border:1px solid var(--trace);border-radius:8px;
    padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
    text-align:left;width:100%;color:inherit;font:inherit;
  }
  .module:hover{border-color:var(--copper-dim);background:var(--panel-raised);}
  .module:focus-visible{outline:2px solid var(--copper);outline-offset:2px;}
  .module-code{
    font-family:'IBM Plex Mono';font-size:12px;color:var(--copper);
    border:1px solid var(--copper-dim);border-radius:4px;padding:6px 8px;
    flex-shrink:0;min-width:52px;text-align:center;
  }
  .module-body{flex:1;min-width:0;}
  .module-title{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin-bottom:3px;}
  .module-desc{font-size:12.5px;color:var(--text-dim);}
  .module-meta{
    font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);
    flex-shrink:0;text-align:right;white-space:nowrap;
  }

  /* ---- quiz ---- */
  .quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .back-link{
    font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);
    background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  .back-link:hover{color:var(--copper);}
  .progress-track{height:4px;background:var(--trace);border-radius:2px;overflow:hidden;margin-bottom:24px;}
  .progress-fill{height:100%;background:var(--copper);transition:width .3s ease;}
  .q-index{font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);margin-bottom:10px;}

  .q-card{
    background:var(--panel);border:1px solid var(--trace);border-radius:8px;
    padding:24px 22px;margin-bottom:16px;
  }
  .q-text{font-size:17px;line-height:1.5;margin-bottom:20px;}
  .option{
    display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
    background:var(--panel-raised);border:1px solid var(--trace);border-radius:6px;
    padding:13px 14px;margin-bottom:9px;cursor:pointer;color:var(--text);font:inherit;font-size:14px;
    transition:border-color .12s ease, background .12s ease;
  }
  .option:hover:not(:disabled){border-color:var(--copper-dim);}
  .option:focus-visible{outline:2px solid var(--copper);outline-offset:1px;}
  .option:disabled{cursor:default;}
  .option-letter{
    font-family:'IBM Plex Mono';font-size:11px;color:var(--text-faint);
    border:1px solid var(--trace);border-radius:4px;width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  }
  .option.correct{border-color:var(--phosphor);background:var(--phosphor-dim);}
  .option.correct .option-letter{border-color:var(--phosphor);color:var(--phosphor);}
  .option.incorrect{border-color:var(--fault);background:var(--fault-dim);}
  .option.incorrect .option-letter{border-color:var(--fault);color:var(--fault);}
  .option.dimmed{opacity:0.45;}

  .feedback{
    margin-top:6px;padding:16px 18px;border-radius:6px;border:1px solid var(--trace);
    background:var(--panel-raised);font-size:13.5px;line-height:1.6;color:var(--text-dim);
  }
  .feedback-label{
    font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:1px;
    margin-bottom:6px;display:block;
  }
  .feedback.ok .feedback-label{color:var(--phosphor);}
  .feedback.bad .feedback-label{color:var(--fault);}

  .next-btn{
    font-family:'IBM Plex Mono';font-size:13px;color:var(--bg);background:var(--copper);
    border:none;border-radius:6px;padding:12px 20px;cursor:pointer;width:100%;
    margin-top:14px;font-weight:500;letter-spacing:0.3px;
  }
  .next-btn:hover{background:#f0b455;}

  /* ---- summary ---- */
  .summary-score{
    text-align:center;padding:36px 20px;background:var(--panel);border:1px solid var(--trace);
    border-radius:8px;margin-bottom:20px;
  }
  .summary-score .num{font-family:'Space Grotesk';font-size:44px;font-weight:600;color:var(--copper);}
  .summary-score .frac{font-family:'IBM Plex Mono';font-size:13px;color:var(--text-dim);margin-top:4px;}
  .summary-row{
    display:flex;justify-content:space-between;align-items:center;padding:12px 0;
    border-bottom:1px solid var(--trace);font-size:14px;
  }
  .summary-row:last-child{border-bottom:none;}
  .summary-actions{display:flex;gap:10px;margin-top:20px;}
  .summary-actions button{
    flex:1;font-family:'IBM Plex Mono';font-size:12.5px;padding:12px;border-radius:6px;cursor:pointer;
  }
  .btn-primary{background:var(--copper);color:var(--bg);border:none;font-weight:500;}
  .btn-primary:hover{background:#f0b455;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--trace);}
  .btn-ghost:hover{border-color:var(--copper-dim);color:var(--text);}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">K</div>
      <div>
        <div class="brand-name">Kernel</div>
        <div class="brand-tag">Exam practice</div>
      </div>
    </div>
    <div class="spec-tag">OCR H446 · Component 1</div>
  </header>

  <!-- ===== LANDING SCREEN ===== -->
  <section id="screen-landing">
    <h1 class="hero">1.1 Characteristics of contemporary processors</h1>
    <p class="hero-sub">Three modules, each mapped to a spec point. Answer questions one at a time — every answer gets an explanation, right or wrong.</p>

    <div class="board" id="board">
      <svg id="board-svg" viewBox="0 0 680 220" preserveAspectRatio="none" aria-hidden="true">
        <line x1="24" y1="40" x2="24" y2="180" stroke="#2A3F37" stroke-width="1.5"/>
        <line x1="24" y1="40" x2="60" y2="40" stroke="#2A3F37" stroke-width="1.5"/>
        <line x1="24" y1="110" x2="60" y2="110" stroke="#2A3F37" stroke-width="1.5"/>
        <line x1="24" y1="180" x2="60" y2="180" stroke="#2A3F37" stroke-width="1.5"/>
      </svg>
      <div class="modules">
        <button class="module" data-topic="1.1.1">
          <span class="module-code">1.1.1</span>
          <span class="module-body">
            <span class="module-title">Structure and function of the processor</span>
            <span class="module-desc">Von Neumann architecture, FDE cycle, registers, buses, pipelining</span>
          </span>
          <span class="module-meta">5 questions</span>
        </button>
        <button class="module" data-topic="1.1.2">
          <span class="module-code">1.1.2</span>
          <span class="module-body">
            <span class="module-title">Types of processor</span>
            <span class="module-desc">CISC vs RISC, multicore, GPU architecture</span>
          </span>
          <span class="module-meta">4 questions</span>
        </button>
        <button class="module" data-topic="1.1.3">
          <span class="module-code">1.1.3</span>
          <span class="module-body">
            <span class="module-title">Input, output and storage</span>
            <span class="module-desc">Solid state vs magnetic, drivers, RAID, virtual storage</span>
          </span>
          <span class="module-meta">6 questions</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===== QUIZ SCREEN ===== -->
  <section id="screen-quiz" class="hidden">
    <div class="quiz-head">
      <button class="back-link" id="back-btn">&larr; back to modules</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="q-index" id="q-index"></div>
    <div class="q-card">
      <div class="q-text" id="q-text"></div>
      <div id="options"></div>
      <div class="feedback hidden" id="feedback">
        <span class="feedback-label" id="feedback-label"></span>
        <span id="feedback-text"></span>
      </div>
    </div>
    <button class="next-btn hidden" id="next-btn">Next question &rarr;</button>
  </section>

  <!-- ===== SUMMARY SCREEN ===== -->
  <section id="screen-summary" class="hidden">
    <div class="summary-score">
      <div class="num" id="score-num">0%</div>
      <div class="frac" id="score-frac">0 / 0 correct</div>
    </div>
    <div id="summary-topic-name" style="font-family:'IBM Plex Mono'; font-size:12px; color:var(--text-dim); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;"></div>
    <div id="summary-breakdown"></div>
    <div class="summary-actions">
      <button class="btn-ghost" id="retry-btn">Retry module</button>
      <button class="btn-primary" id="board-btn">Back to modules</button>
    </div>
  </section>

</div>

<script>
const DATA = {
  "1.1.1": {
    title: "Structure and function of the processor",
    questions: [
      {
        q: "In the Von Neumann architecture, what does the Program Counter (PC) hold during the fetch stage?",
        options: [
          "The instruction currently being executed",
          "The address of the next instruction to be fetched",
          "The result of the last calculation",
          "The address of a data operand"
        ],
        correct: 1,
        explain: "The PC holds the memory address of the next instruction, not the instruction itself. It's incremented automatically after each fetch (unless a jump or branch changes it)."
      },
      {
        q: "Which register temporarily holds a value that has just been fetched from memory, before it is decoded?",
        options: ["MAR", "MDR", "CIR", "ACC"],
        correct: 1,
        explain: "The Memory Data Register (MDR) holds data being transferred to or from memory. The Memory Address Register (MAR) holds where that data is located, and the CIR holds the instruction once decoded."
      },
      {
        q: "What does the address bus carry?",
        options: [
          "Data values between the CPU and memory",
          "Control signals such as read/write",
          "The memory location that a value should be read from or written to",
          "The system clock signal"
        ],
        correct: 2,
        explain: "The address bus is unidirectional and carries only memory locations, sent from the CPU to memory. Data itself travels on the (bidirectional) data bus."
      },
      {
        q: "A CPU's clock speed rises from 3.0GHz to 3.6GHz with no other changes. What's the most likely effect on performance?",
        options: [
          "Performance falls, because more heat is generated",
          "Performance rises, because more fetch-execute cycles occur per second",
          "Performance is unaffected, since cache size hasn't changed",
          "Performance only rises if word length also increases"
        ],
        correct: 1,
        explain: "More clock cycles per second generally means more instructions processed per second. In practice heat and power draw do rise too, which is why clock speed alone isn't pushed indefinitely — but for this question, other factors are held constant."
      },
      {
        q: "What problem does pipelining mainly aim to solve?",
        options: [
          "Reducing the number of registers the CPU needs",
          "Increasing instruction throughput by overlapping fetch, decode and execute stages",
          "Reducing the width of the data bus",
          "Preventing cache misses"
        ],
        correct: 1,
        explain: "Pipelining lets the fetch, decode and execute stages of different instructions happen at the same time, so more instructions complete per second — though a branch can force the pipeline to be flushed and restarted."
      }
    ]
  },
  "1.1.2": {
    title: "Types of processor",
    questions: [
      {
        q: "Which best describes a key difference between CISC and RISC processors?",
        options: [
          "RISC processors use a smaller set of simpler instructions that each execute in fewer clock cycles",
          "CISC processors always run faster than RISC processors",
          "RISC processors cannot use pipelining",
          "CISC processors have no microcode"
        ],
        correct: 0,
        explain: "RISC (Reduced Instruction Set Computer) favours a small set of simple, fast instructions and relies more on the compiler, while CISC packs more complex operations into single instructions using microcode."
      },
      {
        q: "Why might adding more cores to a processor not double its performance?",
        options: [
          "Cores cannot share a clock signal",
          "Cores share memory bandwidth, and not every task can be split into independent parallel parts",
          "Multicore processors cannot use cache",
          "Only RISC processors can be multicore"
        ],
        correct: 1,
        explain: "Extra cores compete for the same memory bus, and any part of a task that must run sequentially limits how much speed-up is possible — this is often summarised by Amdahl's Law."
      },
      {
        q: "What makes a GPU well suited to tasks like graphics rendering or training neural networks?",
        options: [
          "It has a single very fast core",
          "It contains many simpler cores that can apply the same operation to lots of data at once",
          "It uses a larger word length than any CPU",
          "It removes the need for RAM"
        ],
        correct: 1,
        explain: "GPUs use large numbers of simple cores running the same instruction across many data points in parallel (a SIMD-style approach), which suits tasks like pixel shading or matrix maths."
      },
      {
        q: "In symmetric multiprocessing (SMP), what's true of the processors involved?",
        options: [
          "Each processor runs a separate operating system",
          "All processors are identical and share access to the same main memory",
          "One processor always acts as a controller for the rest",
          "Only one processor may access memory at a time"
        ],
        correct: 1,
        explain: "SMP systems use identical processors under a single operating system, all sharing the same memory space — as opposed to asymmetric setups where roles differ."
      }
    ]
  },
  "1.1.3": {
    title: "Input, output and storage",
    questions: [
      {
        q: "What's the main advantage of solid-state storage over magnetic storage?",
        options: [
          "It's always cheaper per gigabyte",
          "It has no moving parts, giving faster access times and better durability",
          "It has unlimited write cycles",
          "It needs no error correction"
        ],
        correct: 1,
        explain: "SSDs store data electronically with no mechanical read/write head, so access is faster and they're more shock-resistant — though flash memory does have a finite number of write cycles."
      },
      {
        q: "What's the role of a device driver?",
        options: [
          "It physically powers a peripheral device",
          "It translates general OS/application instructions into signals the specific device understands",
          "It stores data permanently for a device",
          "It increases a device's clock speed"
        ],
        correct: 1,
        explain: "A driver acts as a translator between the general-purpose operating system and the specific hardware, so the OS doesn't need to know the details of every device model."
      },
      {
        q: "How does an optical disc read data?",
        options: [
          "A read head detects changes in magnetic polarity",
          "A laser detects differences in reflectivity on the disc surface",
          "Electrical charge is read from a floating gate",
          "Physical grooves are read mechanically, like vinyl"
        ],
        correct: 1,
        explain: "CDs, DVDs and Blu-rays use a laser to detect the reflectivity difference between pits and lands (flat areas) on the disc surface, which encodes binary data."
      },
      {
        q: "What is virtual storage (virtual memory) primarily used for?",
        options: [
          "Storing data permanently when the power is off",
          "Letting a computer run programs larger than physical RAM by using disk space as extra memory",
          "Increasing processor clock speed",
          "Automatically backing up files to the cloud"
        ],
        correct: 1,
        explain: "Virtual memory extends apparent RAM by paging data between RAM and secondary storage, letting programs run that wouldn't otherwise fit — at the cost of speed compared to real RAM."
      },
      {
        q: "Why might a system use a RAID configuration across multiple drives?",
        options: [
          "To reduce total capacity in exchange for better looks",
          "To combine multiple physical drives for improved performance and/or fault tolerance",
          "To convert magnetic storage into optical storage",
          "To remove the need for a device driver"
        ],
        correct: 1,
        explain: "RAID spreads or duplicates data across several drives. Depending on the RAID level chosen, this can boost read/write speed, add redundancy against drive failure, or trade off some usable capacity for both."
      },
      {
        q: "Which statement about ROM is correct?",
        options: [
          "It's volatile and loses its contents when powered off",
          "It typically stores the bootstrap/startup instructions and is non-volatile",
          "It can be freely rewritten by any application",
          "It has faster access speed than CPU registers"
        ],
        correct: 1,
        explain: "ROM holds firmware such as the bootstrap loader and keeps its contents without power. It's not meant to be rewritten during normal operation, unlike RAM."
      }
    ]
  }
};

let state = { topic: null, i: 0, score: 0, answered: false, log: [] };

const screens = {
  landing: document.getElementById('screen-landing'),
  quiz: document.getElementById('screen-quiz'),
  summary: document.getElementById('screen-summary')
};
function show(name){
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.querySelectorAll('.module').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const topic = btn.dataset.topic;
    state = { topic, i:0, score:0, answered:false, log:[] };
    renderQuestion();
    show('quiz');
  });
});

document.getElementById('back-btn').addEventListener('click', ()=> show('landing'));
document.getElementById('board-btn').addEventListener('click', ()=> show('landing'));
document.getElementById('retry-btn').addEventListener('click', ()=>{
  state = { topic: state.topic, i:0, score:0, answered:false, log:[] };
  renderQuestion();
  show('quiz');
});

function renderQuestion(){
  const set = DATA[state.topic];
  const q = set.questions[state.i];
  state.answered = false;

  document.getElementById('q-index').textContent =
    `${set.title} · question ${state.i+1} of ${set.questions.length}`;
  document.getElementById('progress-fill').style.width =
    `${(state.i / set.questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.q;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, idx)=>{
    const b = document.createElement('button');
    b.className = 'option';
    b.innerHTML = `<span class="option-letter">${letters[idx]}</span><span>${opt}</span>`;
    b.addEventListener('click', ()=> selectAnswer(idx));
    optionsEl.appendChild(b);
  });

  document.getElementById('feedback').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered = true;
  const set = DATA[state.topic];
  const q = set.questions[state.i];
  const correct = idx === q.correct;
  if(correct) state.score++;
  state.log.push({q: q.q, correct});

  const opts = document.querySelectorAll('.option');
  opts.forEach((el, i)=>{
    el.disabled = true;
    if(i === q.correct) el.classList.add('correct');
    else if(i === idx) el.classList.add('incorrect');
    else el.classList.add('dimmed');
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('hidden');
  fb.classList.toggle('ok', correct);
  fb.classList.toggle('bad', !correct);
  document.getElementById('feedback-label').textContent = correct ? 'Correct' : 'Not quite';
  document.getElementById('feedback-text').textContent = q.explain;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = (state.i + 1 < set.questions.length) ? 'Next question →' : 'See results →';
}

document.getElementById('next-btn').addEventListener('click', ()=>{
  const set = DATA[state.topic];
  if(state.i + 1 < set.questions.length){
    state.i++;
    renderQuestion();
  } else {
    renderSummary();
    show('summary');
  }
});

function renderSummary(){
  const set = DATA[state.topic];
  const total = set.questions.length;
  const pct = Math.round((state.score / total) * 100);
  document.getElementById('score-num').textContent = `${pct}%`;
  document.getElementById('score-frac').textContent = `${state.score} / ${total} correct`;
  document.getElementById('summary-topic-name').textContent = `${state.topic} · ${set.title}`;

  const breakdown = document.getElementById('summary-breakdown');
  breakdown.innerHTML = '';
  state.log.forEach((entry, i)=>{
    const row = document.createElement('div');
    row.className = 'summary-row';
    row.innerHTML = `
      <span style="color:var(--text-dim); max-width:480px;">${i+1}. ${entry.q}</span>
      <span style="font-family:'IBM Plex Mono'; font-size:11px; color:${entry.correct ? 'var(--phosphor)' : 'var(--fault)'};">
        ${entry.correct ? 'correct' : 'missed'}
      </span>`;
    breakdown.appendChild(row);
  });
}
</script>
</body>
</html>
